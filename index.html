    <script>
    const BTN_COLOR = '#9333EA';
    document.addEventListener('DOMContentLoaded', () => {
      // Enterキーで計算
      document.querySelectorAll('input').forEach(inp => {
        inp.addEventListener('keydown', e => { if (e.key === 'Enter') calculate(); });
        inp.addEventListener('input', () => { if (document.querySelectorAll('input[type="number"]').length === 1) calculate(); });
      });
    });

    function timeToMin(t) {
      const [h, m] = t.split(':').map(Number);
      return h * 60 + m;
    }

    function minToTime(m) {
      const h = Math.floor(m / 60) % 24;
      const mm = m % 60;
      return String(h).padStart(2, '0') + ':' + String(mm).padStart(2, '0');
    }

    function calculate() {
      const wakeVal  = document.getElementById('wake-time').value;
      const leaveVal = document.getElementById('leave-time').value;
      if (!wakeVal || !leaveVal) { alert('起床時刻と出発時刻を入力してください'); return; }

      const wakeMin  = timeToMin(wakeVal);
      const leaveMin = timeToMin(leaveVal);
      const totalMin = leaveMin - wakeMin;

      if (totalMin <= 0) { alert('出発時刻は起床時刻より後に設定してください'); return; }

      // チェックされたタスクを収集
      const taskDefs = [
        { id: 'ck-exercise',  label: '🏃 軽い運動・ストレッチ', min: 10 },
        { id: 'ck-meditation',label: '🧘 瞑想・深呼吸',         min: 5  },
        { id: 'ck-journal',   label: '📝 日記・TODO整理',        min: 10 },
        { id: 'ck-shower',    label: '🚿 シャワー・洗顔',        min: 15 },
        { id: 'ck-breakfast', label: '🍳 朝食',                  min: 20 },
        { id: 'ck-reading',   label: '📖 読書・情報収集',        min: 15 },
      ];

      const selected = taskDefs.filter(t => document.getElementById(t.id).checked);
      // 着替え・準備は常に末尾に追加
      const prep = { label: '👔 着替え・出発準備', min: 10 };

      const usedMin = selected.reduce((s, t) => s + t.min, 0) + prep.min;
      const freeMin = totalMin - usedMin;

      // タイムテーブル生成
      let cursor = wakeMin;
      const rows = [];

      // 起床
      rows.push({ time: minToTime(cursor), task: '⏰ 起床', dur: 0 });

      // 余裕時間を最初に少し配分（ゆっくり目覚め）
      const bufferStart = Math.max(0, Math.min(freeMin, 5));
      if (bufferStart > 0) {
        cursor += bufferStart;
        rows.push({ time: minToTime(cursor - bufferStart) + '〜' + minToTime(cursor), task: '☕ ゆっくり目覚め・水を飲む', dur: bufferStart });
      }

      for (const t of selected) {
        const start = minToTime(cursor);
        cursor += t.min;
        rows.push({ time: start + '〜' + minToTime(cursor), task: t.label, dur: t.min });
      }

      // 残り余裕時間
      const bufferEnd = leaveMin - prep.min - cursor;
      if (bufferEnd > 0) {
        const s = minToTime(cursor);
        cursor += bufferEnd;
        rows.push({ time: s + '〜' + minToTime(cursor), task: '🕐 バッファ（余裕時間）', dur: bufferEnd });
      }

      // 着替え・準備
      rows.push({ time: minToTime(cursor) + '〜' + minToTime(cursor + prep.min), task: prep.label, dur: prep.min });
      cursor += prep.min;

      rows.push({ time: minToTime(leaveMin), task: '🚀 出発！', dur: 0 });

      // スコア（余裕度）
      const slack = freeMin - bufferStart;
      let scoreText, scoreColor;
      if (slack < 0) {
        scoreText = '⚠️ 時間が足りません！タスクを減らしてください。';
        scoreColor = '#dc2626';
      } else if (slack <= 5) {
        scoreText = '😅 かなりタイトなスケジュールです。';
        scoreColor = '#ea580c';
      } else if (slack <= 15) {
        scoreText = '👍 無理のないルーティンです！';
        scoreColor = '#16a34a';
      } else {
        scoreText = '😌 余裕のある朝ルーティンです！';
        scoreColor = '#7c3aed';
      }

      const result = minToTime(wakeMin) + ' 起床 → ' + minToTime(leaveMin) + ' 出発';
      const detail = '合計 ' + totalMin + ' 分 ／ タスク ' + usedMin + ' 分 ／ 余裕 ' + Math.max(0, freeMin) + ' 分';

      // 結果を表示（変更不要）
      document.getElementById('output').textContent = typeof result === 'number' ? result.toLocaleString() : result;
      document.getElementById('detail').textContent = detail;
      document.getElementById('result').classList.add('show');

      // テーブル描画
      const tableHtml = `<p style="font-size:14px;font-weight:700;color:${scoreColor};margin-bottom:8px;">${scoreText}</p>
        <table class="routine-table">
          <thead><tr><th style="width:130px;">時刻</th><th>タスク</th><th style="width:50px;text-align:right;">分</th></tr></thead>
          <tbody>` +
        rows.map(r => `<tr>
          <td class="time-col">${r.time}</td>
          <td>${r.task}</td>
          <td style="text-align:right;color:#888;">${r.dur > 0 ? r.dur + '分' : ''}</td>
        </tr>`).join('') +
        '</tbody></table>';
      document.getElementById('timetable-wrap').innerHTML = tableHtml;
    }
    </script>
